<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: indigo rounded square -->
  <rect width="64" height="64" rx="14" fill="#4F46E5"/>

  <!-- Subtle inner glow / gradient overlay -->
  <rect width="64" height="64" rx="14" fill="url(#grad)" opacity="0.5"/>

  <!-- Trending-up arrow (matches lucide TrendingUp icon) -->
  <!-- Arrow line: going up-right -->
  <polyline
    points="8,44 22,30 32,40 56,16"
    fill="none"
    stroke="white"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow head -->
  <polyline
    points="42,16 56,16 56,30"
    fill="none"
    stroke="white"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>